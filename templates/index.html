<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VidFetch — حمّل فيديوهات من يوتيوب وتيك توك وانستغرام بأعلى جودة مجاناً">
    <title>VidFetch — تحميل الفيديوهات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- الخلفية المتحركة -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- الهيدر -->
    <header class="header">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span>VidFetch</span>
        </div>
        <div class="header-badge">مجاني 100%</div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="main">
        <section class="hero">
            <h1 class="hero-title">حمّل أي فيديو<br><span class="gradient-text">بأعلى جودة</span></h1>
            <p class="hero-subtitle">يوتيوب • تيك توك • انستغرام — الصق الرابط وانطلق</p>
        </section>

        <!-- حقل الإدخال -->
        <div class="input-section">
            <div class="input-wrapper" id="inputWrapper">
                <input
                    type="url"
                    id="urlInput"
                    class="url-input"
                    placeholder="الصق رابط الفيديو هنا..."
                    autocomplete="off"
                    spellcheck="false"
                >
                <button class="paste-btn" id="pasteBtn" title="لصق من الحافظة">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                </button>
                <button class="fetch-btn" id="fetchBtn">
                    <span class="btn-text">جلب الفيديو</span>
                    <span class="btn-loader" id="btnLoader"></span>
                </button>
            </div>
            <p class="input-hint" id="inputHint"></p>
        </div>

        <!-- بطاقة نتيجة الفيديو -->
        <div class="result-card" id="resultCard">
            <div class="result-inner">
                <!-- المعاينة -->
                <div class="preview-section">
                    <div class="thumb-wrapper">
                        <img id="videoThumb" class="video-thumb" src="" alt="صورة الفيديو">
                        <div class="thumb-overlay">
                            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </div>
                    </div>
                </div>

                <!-- التفاصيل -->
                <div class="details-section">
                    <h2 class="video-title" id="videoTitle"></h2>

                    <div class="action-buttons">
                        <button class="action-btn action-stream" id="streamBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            تشغيل مباشر
                        </button>
                        <a class="action-btn action-download" id="downloadBtn" href="#" download>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            تحميل
                        </a>
                    </div>
                </div>
            </div>

            <!-- مشغل الفيديو -->
            <div class="player-section" id="playerSection">
                <video id="videoPlayer" controls playsinline preload="metadata"></video>
            </div>
        </div>

        <!-- رسالة الخطأ -->
        <div class="error-toast" id="errorToast">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="errorMessage"></span>
        </div>
    </main>

    <!-- الفوتر -->
    <footer class="footer">
        <p>VidFetch &copy; 2026 — صُنع بـ ❤️</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>

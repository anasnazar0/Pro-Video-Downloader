<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Download and stream videos from YouTube, TikTok, Instagram, X and more. Fast, free, and browser-friendly." />
    <title>StreamVault — Video Downloader &amp; Streamer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <!-- ======= Background blobs ======= -->
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>

    <main class="container">
        <!-- ======= Header ======= -->
        <header class="header">
            <div class="logo">
                <svg class="logo__icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="10" fill="url(#logo-grad)"/>
                    <polygon points="16,12 16,28 28,20" fill="#fff"/>
                    <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6C63FF"/><stop offset="1" stop-color="#E040FB"/></linearGradient></defs>
                </svg>
                <h1 class="logo__text">Stream<span>Vault</span></h1>
            </div>
            <p class="header__sub">Paste any video link — YouTube, TikTok, Instagram, X &amp; more</p>
        </header>

        <!-- ======= URL Form ======= -->
        <form id="urlForm" class="form-card" autocomplete="off">
            <div class="form-card__input-wrap">
                <input
                    type="url"
                    id="urlInput"
                    class="form-card__input"
                    placeholder="https://www.youtube.com/watch?v=..."
                    required
                />
                <button type="submit" id="submitBtn" class="form-card__btn">
                    <span class="btn-label">Fetch Video</span>
                    <span class="btn-spinner" hidden></span>
                </button>
            </div>
        </form>

        <!-- ======= Status / Loader ======= -->
        <div id="statusArea" class="status" hidden>
            <div class="status__loader">
                <div class="ring-spinner"></div>
            </div>
            <p class="status__text" id="statusText">Processing…</p>
        </div>

        <!-- ======= Result Card ======= -->
        <section id="resultCard" class="result-card" hidden>
            <div class="result-card__player-wrap">
                <video id="videoPlayer" class="result-card__video" controls preload="metadata">
                    Your browser does not support HTML5 video.
                </video>
            </div>

            <div class="result-card__info">
                <h2 id="videoTitle" class="result-card__title"></h2>
                <div class="result-card__meta">
                    <span id="videoDuration" class="badge">—</span>
                    <span id="videoSize" class="badge">—</span>
                </div>
                <a id="downloadBtn" class="download-btn" download>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download MP4
                </a>
            </div>
        </section>
    </main>

    <!-- ======= Error Toast ======= -->
    <div id="errorToast" class="toast" hidden>
        <span id="toastMsg"></span>
        <button id="toastClose" class="toast__close" aria-label="Close">&times;</button>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
